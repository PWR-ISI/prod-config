services:
  localstack:
    image: localstack/localstack-pro:latest
    container_name: prod-localstack
    ports:
      - "127.0.0.1:4566:4566"
      - "127.0.0.1:4510-4559:4510-4559"
    environment:
      - SERVICES=apigateway,apigatewayv2,sqs,sns,s3,cognito-idp,iam,sts,logs,lambda,dynamodb,ecr,ecs,elbv2,rds,cloudwatch,events
      - DEBUG=1
      - AWS_DEFAULT_REGION=us-east-1
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN}
      - PERSISTENCE=1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./localstack-init:/etc/localstack/init/ready.d"
      - "./localstack-data:/var/lib/localstack"
    healthcheck:
      # init/ready.d/ids.env is the last thing 00-bootstrap.sh writes — its presence means all resources exist.
      test: ["CMD-SHELL", "test -f /etc/localstack/init/ready.d/ids.env"]
      interval: 5s
      timeout: 3s
      retries: 40
      start_period: 20s

  postgres:
    image: postgres:15
    container_name: prod-postgres
    environment:
      - POSTGRES_USER=appuser
      - POSTGRES_PASSWORD=appuser123
      - POSTGRES_DB=coredb
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d coredb"]
      interval: 5s
      timeout: 3s
      retries: 10

  auth-service:
    build:
      context: ./auth-identity-service
    env_file:
      - ./localstack-init/ids.env
    environment:
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=coredb
      - DB_USER=appuser
      - DB_PASSWORD=appuser123
      - ALLOWED_HOSTS=*
    depends_on:
      localstack:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8001:8000"

  core-service:
    build:
      context: ./appointment-service
    env_file:
      - ./localstack-init/ids.env
    environment:
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=coredb
      - DB_USER=appuser
      - DB_PASSWORD=appuser123
      - ALLOWED_HOSTS=*
    depends_on:
      localstack:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8002:8000"

  notification-service:
    build:
      context: ./notification-service
    env_file:
      - ./localstack-init/ids.env
    environment:
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=coredb
      - DB_USER=appuser
      - DB_PASSWORD=appuser123
      - ALLOWED_HOSTS=*
    depends_on:
      localstack:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8003:8000"

  payment-service:
    build:
      context: ./payment-service
    container_name: prod-config-payment-service
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn payment.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120"
    env_file:
      - ./localstack-init/ids.env
    environment:
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - DJANGO_DB_HOST=postgres-payment
      - DJANGO_DB_PORT=5432
      - DJANGO_DB_NAME=payment_db
      - DJANGO_DB_USER=payment_user
      - DJANGO_DB_PASSWORD=payment_pass
      - ALLOWED_HOSTS=*
    depends_on:
      localstack:
        condition: service_healthy
      postgres-payment:
        condition: service_healthy
    ports:
      - "8004:8000"

  postgres-payment:
    image: postgres:15-alpine
    container_name: prod-config-postgres-payment
    environment:
      - POSTGRES_DB=payment_db
      - POSTGRES_USER=payment_user
      - POSTGRES_PASSWORD=payment_pass
    volumes:
      - postgres-payment-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment_user -d payment_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: ./frontend-portal
    ports:
      - "3000:80"
    depends_on:
      - auth-service
      - core-service
      - notification-service
      - payment-service

volumes:
  postgres-data:
  postgres-payment-data:
