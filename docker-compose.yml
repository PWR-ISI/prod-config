services:
  localstack:
    image: ${LOCALSTACK_IMAGE:-localstack/localstack:latest}
    container_name: prod-localstack
    ports:
      - "127.0.0.1:4566:4566"
      - "127.0.0.1:4510-4559:4510-4559"
    environment:
      - SERVICES=apigateway,apigatewayv2,sqs,sns,s3,cognito-idp,iam,sts,logs,lambda,dynamodb,ecr,ecs,elbv2,rds,cloudwatch,events,ec2
      - DEBUG=1
      - AWS_DEFAULT_REGION=us-east-1
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN:-}
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./localstack-init:/etc/localstack/init/ready.d"
      - "./localstack-data:/var/lib/localstack"
    healthcheck:
      # init/ready.d/ids.env is the last thing 00-bootstrap.sh writes — its presence means all resources exist.
      test: ["CMD-SHELL", "test -f /etc/localstack/init/ready.d/ids.env"]
      interval: 5s
      timeout: 3s
      retries: 40
      start_period: 20s

  # Real Postgres for payment-service ECS tasks (LocalStack RDS emulation has no real connectivity).
  postgres-payment:
    image: postgres:15-alpine
    container_name: prod-config-postgres-payment
    environment:
      - POSTGRES_DB=payment_db
      - POSTGRES_USER=payment_user
      - POSTGRES_PASSWORD=payment_pass
    volumes:
      - postgres-payment-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment_user -d payment_db"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-payment-data:
