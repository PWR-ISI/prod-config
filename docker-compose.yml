services:
  localstack:
    image: localstack/localstack-pro:latest
    container_name: prod-localstack
    ports:
      - "127.0.0.1:4566:4566"
      - "127.0.0.1:4510-4559:4510-4559"
    environment:
      - SERVICES=apigateway,apigatewayv2,sqs,s3,cognito-idp,iam,sts,logs,secretsmanager,ecr,ecs
      - DEBUG=1
      - AWS_DEFAULT_REGION=us-east-1
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN}
      - PERSISTENCE=1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./localstack-init:/etc/localstack/init/ready.d"
      - "./localstack-data:/var/lib/localstack"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  auth-identity-service:
    build:
      context: ./auth-identity-service
    environment:
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID:-}
      - COGNITO_APP_CLIENT_ID=${COGNITO_APP_CLIENT_ID:-}
      - COGNITO_REGION=us-east-1
      - SQS_QUEUE_URL=http://localstack:4566/000000000000/auth-identity-service-queue
      - DJANGO_SETTINGS_MODULE=config.settings.local
      - ALLOWED_HOSTS=*
    depends_on:
      localstack:
        condition: service_healthy
    ports:
      - "8001:8000"

